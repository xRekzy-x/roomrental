<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Rental - Khách thuê</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/app.js?v=3"></script>
</head>
<body>

    <header></header>
    <div class="nav-container"></div>

    <main>
        <!-- Danh sách khách thuê rộng 100% -->
        <div class="card" style="width: 100%;">
            <div class="card-header-flex">
                <div class="search-box-container">
                    <input type="text" id="search-input" placeholder="Tìm tên, CCCD, SĐT..." oninput="filterTable('table-renters-body')" class="search-input">
                </div>
                <h2>Danh sách khách thuê</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <button onclick="openRenterModal()" class="btn btn-primary" style="width: auto; padding: 0.5rem 1rem;">Thêm khách thuê</button>
                    <button onclick="fetchRenters()" class="btn btn-secondary">Làm mới</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="responsive-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Tên khách</th>
                            <th>CCCD</th>
                            <th>SĐT</th>
                            <th>Phòng ID</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="table-renters-body">
                        <!-- JS load data -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Hộp thoại nổi (Modal) cho Khách thuê -->
        <div id="renter-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeRenterModal()">&times</span>
                <h2 class="card-title" style="margin-bottom: 1rem;">Thêm khách thuê</h2>
                <form id="form-renter">
                    <div class="form-group">
                        <label>Họ và tên *</label>
                        <input type="text" id="renterName" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Số CCCD *</label>
                        <input type="text" id="renterCccd" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Số điện thoại</label>
                        <input type="text" id="renterPhone" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Ngày sinh</label>
                        <input type="date" id="renterDob" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Số phòng *</label>
                        <input type="text" id="renterRoomNumber" required class="form-control" placeholder="Ví dụ: 101">
                    </div>
                    <div id="form-renter-error" class="form-error" role="alert"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Lưu khách thuê</button>
                </form>
            </div>
        </div>
    </main>
    <div id="editRenterModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEditRenter()">&times;</span>
            <h2 class="card-title" style="margin-bottom: 1rem;">Chỉnh sửa khách thuê</h2>

            <input type="hidden" id="editRenterId">

            <div class="form-group">
                <label>Họ và tên</label>
                <input id="editFullName" class="form-control">
            </div>

            <div class="form-group">
                <label>Số điện thoại</label>
                <input id="editPhone" class="form-control">
            </div>

            <div class="form-group">
                <label>Số phòng</label>
                <input id="editRoomNumber" class="form-control">
            </div>

            <div id="edit-form-renter-error" class="form-error" role="alert"></div>
            <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                <button onclick="saveRenter()" type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Lưu khách thuê</button>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-container">
            <h3>Logs / System Response:</h3>
            <div id="log-output" class="log-box">Chờ hành động...</div>
        </div>
    </footer>

</body>
</html>
