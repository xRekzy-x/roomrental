<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Rental - Quản lý phòng</title>
    <link rel="stylesheet" href="/css/style.css?v=4">
    <script src="/js/app.js?v=5"></script>

</head>
<body>

    <header></header>
    <div class="nav-container"></div>

    <main>
        <!-- Card Danh sách phòng hiển thị rộng 100% -->
        <div class="card" style="width: 100%;">
            <div class="card-header-flex">
                <div class="search-box-container">
                        <input type="text" id="search-input" placeholder="Tìm số phòng, giá..." oninput="filterTable('table-rooms-body')" class="search-input">
                    </div>
                <h2>Danh sách phòng</h2>
                <div style="display: flex; gap: 0.5rem;">
                    <!-- Nút bấm mở Form thêm phòng -->
                    <button onclick="openRoomModal()" class="btn btn-primary" style="width: auto; padding: 0.5rem 1rem;">Thêm phòng mới</button>
                    <button onclick="fetchRooms()" class="btn btn-secondary">Làm mới</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="responsive-table">
                    <thead>
                        <tr>
                            <th>Số phòng</th>
                            <th>Diện tích</th>
                            <th>Giá tiền</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="table-rooms-body">
                        <!-- JS load data -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Hộp thoại nổi (Modal) chứa Form thêm phòng -->
        <div id="room-modal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeRoomModal()">&times;</span>
                <h2 class="card-title" style="margin-bottom: 1rem;">Thêm phòng mới</h2>
                <form id="form-room">
                    <div class="form-group">
                        <label>Số phòng *</label>
                        <input type="text" id="roomNumber" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Diện tích (m²)</label>
                        <input type="number" step="0.1" id="roomArea" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Giá phòng (VNĐ) *</label>
                        <input type="number" id="roomPrice" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select id="roomStatus" class="form-control">
                            <option value="AVAILABLE">Trống (AVAILABLE)</option>
                            <option value="OCCUPIED">Đã thuê (OCCUPIED)</option>
                            <option value="MAINTENANCE">Bảo trì (MAINTENANCE)</option>
                        </select>
                    </div>
                    <div id="form-room-error" class="form-error" role="alert"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Lưu phòng</button>
                </form>
            </div>
        </div>

        <!-- Hộp thoại nổi (Modal) chứa Form sửa phòng -->
        <div id="editRoomModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeEditRoom()">&times;</span>
                <h2 class="card-title" style="margin-bottom: 1rem;">Chỉnh sửa phòng</h2>
                <form id="edit-form-room" onsubmit="event.preventDefault(); saveRoom();">
                    <div class="form-group">
                        <label>Số phòng</label>
                        <input type="text" id="editRoomNumber" readonly class="form-control" style="background-color: #f3f4f6; cursor: not-allowed;">
                    </div>
                    <div class="form-group">
                        <label>Diện tích (m²)</label>
                        <input type="number" step="0.1" id="editRoomArea" class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Giá phòng (VNĐ) *</label>
                        <input type="number" id="editRoomPrice" required class="form-control">
                    </div>
                    <div class="form-group">
                        <label>Trạng thái</label>
                        <select id="editRoomStatus" class="form-control">
                            <option value="AVAILABLE">Trống (AVAILABLE)</option>
                            <option value="OCCUPIED">Đã thuê (OCCUPIED)</option>
                            <option value="MAINTENANCE">Bảo trì (MAINTENANCE)</option>
                        </select>
                    </div>
                    <div id="edit-form-room-error" class="form-error" role="alert"></div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 0.5rem;">Lưu thay đổi</button>
                </form>
            </div>
        </div>
    </main>

   

    <footer>
        <div class="footer-container">
            <h3>Logs / System Response:</h3>
            <div id="log-output" class="log-box">Chờ hành động kiểm thử...</div>
        </div>
    </footer>

</body>
</html>
