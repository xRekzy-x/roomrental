<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Rental - Ghi số Điện Nước trực tiếp</title>
    <link rel="stylesheet" href="/css/style.css?v=13">
    <script src="/js/app.js?v=14"></script>
</head>
<body>

    <header></header>
    <div class="nav-container"></div>

    <main>
        <div class="card" style="width: 100%; margin-bottom: 1.5rem;">
            <div class="card-header-flex" style="margin-bottom: 0;">
                <h2>Bảng ghi số Điện Nước & Dịch vụ nhanh</h2>
                <div style="display: flex; gap: 0.5rem; align-items: center;">
                    <label for="bill-month-select" style="font-weight: 600; font-size: 0.9rem;">Kỳ thanh toán:</label>
                    <input type="month" id="bill-month-select" class="form-control" style="width: auto;" onchange="fetchUtilityBills()">
                </div>
            </div>
        </div>

       <div class="header-actions">
            <div class="search-box-container">
                <input type="text" id="search-input" placeholder="Tìm số phòng..." oninput="filterTable('table-bills-body')" class="search-input">
            </div>
            <button onclick="fetchUtilityBills()" class="btn btn-secondary">Tải lại bảng</button>
            <button onclick="loadPreviousMonthFees()" class="btn btn-secondary">Load tháng trước</button>
            <button onclick="downloadAllInvoices()" class="btn" style="background-color: #4f46e5; color: white;">In tất cả</button>
            <button onclick="exportAsExcel()" class="btn" style="background-color: #10b981; color: white;">Xuất Excel</button>
            <button onclick="triggerExcelImport()" class="btn" style="background-color: #2563eb; color: white;">Nhập Excel</button>
            <input type="file" id="import-excel-file" accept=".csv" style="display: none;" onchange="handleExcelImport(event)">
        </div>
            <div class="table-wrapper">
                <table class="responsive-table">
                    <thead>
                        <tr>
                            <th style="width: 100px;">Số phòng</th>
                            <th style="width: 180px;">Số Điện Cũ</th>
                            <th style="width: 180px;">Số Điện Mới</th>
                            <th style="width: 100px;">Đơn giá điện</th>
                            <th style="width: 110px;">Tiền nước khoán</th>
                            <th style="width: 190px;">Internet</th>
                            <th style="width: 190px;">Máy giặt</th>
                            <th style="width: 100px;">Rác/VS/Điện chung</th>
                            <th style="width: 130px;">Tổng hóa đơn</th>
                            <th style="width: 130px;">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="table-bills-body">
                        <!-- JS tự động load toàn bộ phòng kèm ô nhập liệu -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <h3>Logs / System Response:</h3>
            <div id="log-output" class="log-box">Chờ hành động...</div>
        </div>
    </footer>

</body>
</html>
